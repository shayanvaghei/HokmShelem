<div class="card mb-4">
    <h3 class="card-header text-center">{{member.name}}</h3>
    <div class="card-img-wrapper">
        <img src="{{member.photoUrl || './assets/user.png'}}" alt="{{member.name}}" class="card-img-top">
        <ul class="list-inline member-icons animate text-center">
            <li class="list-inline-item">
                <button routerLink='/members/{{member.name}}' class="btn btn-primary"><i
                        class="fa fa-user"></i></button>
            </li>
            <li class="list-inline-item">
                <button class="btn btn-primary"><i class="fa fa-heart"></i></button>
            </li>
            <li class="list-inline-item">
                <button class="btn btn-primary"><i class="fa fa-envelope"></i></button>
            </li>
        </ul>
    </div>
    <div class="card-body p-1">
        <ul class="list-group list-group-flush">
            <li class="list-group-item text-center"><img class="country-image" src="/assets/images/countries/{{member.country}}.png"></li>
        </ul>
    </div>
    <div class="text-center card-footer text-muted">
        Last active 2 days ago
    </div>
</div>
