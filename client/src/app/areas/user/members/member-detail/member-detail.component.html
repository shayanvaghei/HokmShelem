<div class="wrapper" *ngIf="member">
    <div class="row">
        <div class="col-lg-4 col-sm-12">
            <div class="card">
                <img src="{{member.photoUrl || './assets/user.png'}}" class="card-img-top img-thumbnail"
                    alt="{{member.name}}">
                <div class="card-body">
                    <div>
                        <strong>Location:</strong>
                        <p>{{member.country}}</p>
                    </div>
                    <div>
                        <strong>Status:</strong>
                        <p>{{member.status}}</p>
                    </div>
                    <div>
                        <strong>Joined on:</strong>
                        <p>{{member.created}}</p>
                    </div>
                    <div>
                        <strong>Last Active:</strong>
                        <p>{{member.lastActive}}</p>
                    </div>
                    <div>
                        <strong>Country</strong>
                        <p><img class="country-image mt-2" src="/assets/images/countries/{{member.country}}.png" alt="{{member.country}}" ></p>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="btn-group d-flex">
                        <button class="btn btn-primary">Follow</button>
                        <button class="btn btn-success ml-2">Message</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-sm-12">
            <tabset class="member-tabset">
                <tab heading='About {{member.name}}'>
                    <h4>Description</h4>
                    <p>{{member.aboutMe}}</p>
                    <h4>Hokm</h4>
                    <p>{{member.lookingFor}}</p>
                </tab>
                <tab heading='Photos'>
                    <ngx-gallery [options]="galleryOptions" [images]="galleryImages"
                        style="display: inline-block; margin-top: 20px;"></ngx-gallery>
                </tab>
                <tab heading='Friends'>
                    <p>Firends</p>
                </tab>
            </tabset>
            <!-- <ngx-gallery [options]="galleryOptions" [images]="galleryImages"
            style="display: inline-block; margin-top: 20px;"></ngx-gallery> -->
        </div>
    </div>

</div>
