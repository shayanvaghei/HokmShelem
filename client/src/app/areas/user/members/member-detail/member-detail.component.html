<div class="wrapper" *ngIf="member">
    <div class="row">
        <div class="col-lg-4 col-sm-12">
            <div class="card">
                <img src="{{member.photoUrl || './assets/user.png'}}" class="card-img-top img-thumbnail"
                    alt="{{member.name}}">
                <div class="card-body">
                    <div>
                        <strong class="text-muted">Status:</strong>
                        <p [ngClass]="{'text-success': playerIsOnline, 'text-muted': !playerIsOnline}"
                            style="font-size: 1.5rem; font-weight: bold;">{{member.status}}</p>
                    </div>
                    <div>
                        <strong class="text-muted">Member since:</strong>
                        <p>{{member.created}}</p>
                    </div>
                    <div>
                        <strong class="text-muted">Last Active:</strong>
                        <p>{{member.lastActive}}</p>
                    </div>
                    <div>
                        <strong class="text-muted">Country</strong>
                        <p>{{member.country}}<img class="country-image mt-2 ml-2"
                                src="/assets/images/countries/{{member.country}}.png" alt="{{member.country}}"></p>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="btn-group d-flex">
                        <button class="btn btn-primary" style="width: 50%;"><i class="fas fa-user-plus"></i> Add
                            friend</button>
                        <button class="btn btn-success ml-2" style="width: 50%;"><i class="fas fa-comments-dollar"></i>
                            Message</button>
                    </div>
                    <div class="btn-group d-flex mt-2">
                        <button class="btn btn-warning" style="width: 50%;"><i class="fas fa-flag"></i> Report</button>
                        <button class="btn btn-danger ml-2" style="width: 50%;"><i class="fas fa-ban"></i>
                            Block</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="second col-lg-8 col-sm-12">
            <tabset class="member-tabset">
                <tab heading='About {{member.name}}'>
                    <h4 class="mt-3">Description</h4>
                    <p>{{member.aboutMe}}</p>
                    <h4>Hokm</h4>
                    <p>{{member.hokmScore}}</p>
                </tab>
                <tab heading='Photos'>
                    <ngx-gallery [options]="galleryOptions" [images]="galleryImages"
                        style="display: inline-block; margin-top: 20px;"></ngx-gallery>
                </tab>
                <tab heading='Friends'>
                    <p>Firends</p>
                </tab>
            </tabset>
        </div>
    </div>
</div>
