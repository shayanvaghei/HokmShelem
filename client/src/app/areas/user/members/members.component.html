<div class="container">
    <div class="row">
        <section class="col-12">
            <div class="d-flex justify-content-between align-items-center pb-2">
                <header>
                    <span>Showing <strong>10</strong> of <strong>16</strong> Results</span>
                </header>
                <div class="form-inline mt-2">
                    <input class="form-control mr-2" style="width: 300px;" placeholder="Search" type="text">
                    <button class="btn btn-outline-primary my-2">Search</button>
                    <button class="btn btn-outline-success ml-2 my-2">Reset</button>
                </div>
            </div>
           
            <div class="row-cols-lg-4 row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
                <div *ngFor="let member of members" class="col">
                    <app-member-card [member]="member"></app-member-card>
                </div>
            </div>

        </section>
     </div>
</div>
