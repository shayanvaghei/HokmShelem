<div class="wrapper" *ngIf="member">
    <div class="row">
        <div class="col-8">
            <tabset class="member-tabset">
                <tab heading='About {{member.name}}'>
                    <h4>Description</h4>
                    <p>{{member.aboutMe}}</p>
                </tab>
                <tab heading='Interests'>
                    <h4>Interests</h4>
                    <p>{{member.country}}</p>
                </tab>
                <tab heading='Photos'>
                    <p>Photo</p>
                </tab>
                <tab heading='Messages'>
                    <p>Messages here</p>
                </tab>
            </tabset>
        </div>
    </div>

</div>
